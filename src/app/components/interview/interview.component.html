<div class="app-shell">
  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <div class="header__logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="header__text">
          <h1>Interview Coach</h1>
          <span class="header__badge" *ngIf="sessionStarted">Interview Mode</span>
          <span class="header__badge header__badge--ask" *ngIf="askMode">Q&A Mode</span>
        </div>
      </div>
      <button class="btn-reset header__new" (click)="sessionStarted || askMode ? (sessionStarted ? newSession() : newAskSession()) : null"
              *ngIf="sessionStarted || askMode">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        New Session
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Welcome -->
    <app-welcome
      *ngIf="!sessionStarted && !askMode && !isLoading"
      (startInterview)="startSession()"
      (startAsk)="startAskMode()">
    </app-welcome>

    <!-- Loading -->
    <div class="loading" *ngIf="isLoading && !sessionStarted">
      <div class="loading__spinner"></div>
      <p>Starting your interview session...</p>
    </div>

    <!-- Interview Chat -->
    <div class="chat" *ngIf="sessionStarted">
      <div class="chat__messages" #messagesContainer>
        <app-chat-message
          *ngFor="let msg of messages; trackBy: trackById"
          [message]="msg"
          [roleConfig]="getRoleConfig(msg.role, 'interview')">
        </app-chat-message>

        <!-- Typing indicator -->
        <div class="chat__typing" *ngIf="isLoading">
          <div class="chat__typing-avatar">🤖</div>
          <div class="chat__typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div class="chat__input-area">
        <div class="chat__input-wrap">
          <textarea
            [(ngModel)]="currentAnswer"
            (keydown.enter)="handleEnter($event, 'interview')"
            placeholder="Type your answer..."
            rows="2"
            [disabled]="isLoading"
          ></textarea>
          <button
            class="chat__send"
            (click)="submitAnswer()"
            [disabled]="!currentAnswer.trim() || isLoading">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
        <p class="chat__hint">Enter to send · Shift+Enter for new line</p>
      </div>
    </div>

    <!-- Ask Question Chat -->
    <div class="chat" *ngIf="askMode">
      <div class="chat__messages" #askMessagesContainer>
        <app-chat-message
          *ngFor="let msg of askMessages; trackBy: trackById"
          [message]="msg"
          [roleConfig]="getRoleConfig(msg.role, 'ask')">
        </app-chat-message>

        <!-- Typing indicator -->
        <div class="chat__typing" *ngIf="askLoading">
          <div class="chat__typing-avatar">💡</div>
          <div class="chat__typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div class="chat__input-area">
        <div class="chat__input-wrap">
          <textarea
            [(ngModel)]="askQuestionInput"
            (keydown.enter)="handleEnter($event, 'ask')"
            placeholder="Ask about Java, Spring, or AWS..."
            rows="2"
            [disabled]="askLoading"
          ></textarea>
          <button
            class="chat__send"
            (click)="submitAskQuestion()"
            [disabled]="!askQuestionInput.trim() || askLoading">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
        <p class="chat__hint">Enter to send · Shift+Enter for new line</p>
      </div>
    </div>
  </main>
</div>
